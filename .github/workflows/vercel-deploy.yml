# GitHub Actions 部署到 Vercel（无需 Vercel 关联 Git，使用 prebuilt 上传构建结果）
#
# 必须在 GitHub 配置 Secrets（Settings → Secrets and variables → Actions）：
#   VERCEL_TOKEN       https://vercel.com/account/tokens → Create Token
#   VERCEL_ORG_ID      Vercel 项目 → Settings → General → Team / Personal ID
#   VERCEL_PROJECT_ID  Vercel 项目 → Settings → General → Project ID

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检查必需的 Secrets
        run: |
          missing=0
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "::error::未配置 VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "::error::未配置 VERCEL_ORG_ID"
            missing=1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::error::未配置 VERCEL_PROJECT_ID"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "请到 GitHub 仓库 → Settings → Secrets and variables → Actions → New repository secret"
            echo "添加以上三个 Secret 后，在 Actions 页重新 Run workflow。"
            echo "获取方式见仓库 README.md「方式 B」章节。"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Vercel CLI
        run: npm install -g vercel@41

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
